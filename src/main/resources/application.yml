spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/flash_coupon
    username: coupon_user
    password: coupon_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  sql:
    init:
      mode: never